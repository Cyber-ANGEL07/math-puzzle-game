<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRT NIGHTS · Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Background music -->
  <audio id="bgm" loop preload="auto">
    <source src="assets/audio/bgm.mp3" type="audio/mpeg">
  </audio>

  <!-- Button click sound -->
  <audio id="clickSound" preload="auto">
    <source src="assets/audio/click.mp3" type="audio/mpeg">
  </audio>
  <audio id="buttonSound" preload="auto">
    <source src="assets/audio/click_button.mp3" type="audio/mpeg">
  </audio>

  <!-- Mute button -->
  <button id="muteBtn" onclick="toggleMute()">🔊</button>

  <!-- Retro CRT background canvas -->
  <canvas id="bgCanvas"></canvas>

  <!-- CRT overlay (scanlines etc. from CSS) -->
  <div class="circuit-overlay"></div>

  <div class="auth-container">
    <h1>◈ NEURAL NEXUS ◈</h1>
    <h2 class="sub-header">ACCESS TERMINAL</h2>

    <div class="input-group">
      <span class="prompt">></span>
      <input type="text" id="username" placeholder="USERNAME">
    </div>

    <div class="input-group">
      <span class="prompt">></span>
      <input type="password" id="password" placeholder="PASSWORD">
    </div>

    <div class="button-container">
      <button id="registerBtn" class="retro-btn">REGISTER</button>
      <button id="loginBtn" class="retro-btn">LOGIN</button>
    </div>

    <p id="authMessage"></p>
  </div>

  <script>
    // ==================== AUDIO SETUP ====================
    const bgm = document.getElementById("bgm");
    const clickSound = document.getElementById("clickSound");
    const buttonSound = document.getElementById("buttonSound");
    const muteBtn = document.getElementById("muteBtn");

    let isMuted = localStorage.getItem("bgmMuted") === "true";

    function setMuted(muted) {
      isMuted = muted;
      bgm.muted = muted;
      clickSound.muted = muted;
      buttonSound.muted = muted;
      muteBtn.textContent = muted ? "🔇" : "🔊";
      localStorage.setItem("bgmMuted", muted);
    }
    setMuted(isMuted);

    function toggleMute() {
      setMuted(!isMuted);
    }

    function playSound(sound) {
      if (!isMuted && sound) {
        sound.currentTime = 0;
        sound.play().catch(() => {});
      }
    }

    // BGM start with autoplay fallback
    let bgmStarted = false;
    function startBGM() {
      if (bgmStarted) return;
      bgm.volume = 0.2;
      bgm.play()
        .then(() => bgmStarted = true)
        .catch(() => {
          document.addEventListener('click', function retry() {
            startBGM();
            document.removeEventListener('click', retry);
          });
        });
    }

    // ========== OSCILLOSCOPE BACKGROUND (same as index) ==========
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    let time = 0;

    function initOscilloscope() {
      resizeCanvas();
      animate();
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    function animate() {
      time += 0.05;
      ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawWaveform();
      drawScanningDot();
      requestAnimationFrame(animate);
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255, 176, 0, 0.1)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawWaveform() {
      ctx.beginPath();
      ctx.strokeStyle = '#ffb000';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ffb000';
      ctx.shadowBlur = 10;
      const centerY = canvas.height / 2;
      for (let x = 0; x < canvas.width; x += 5) {
        const y = centerY + 
          Math.sin(x * 0.02 + time) * 30 + 
          Math.sin(x * 0.01 + time * 2) * 15 +
          Math.cos(x * 0.03 + time * 1.3) * 10;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawScanningDot() {
      const x = (time * 50) % canvas.width;
      const centerY = canvas.height / 2;
      const y = centerY + 
        Math.sin(x * 0.02 + time) * 30 + 
        Math.sin(x * 0.01 + time * 2) * 15 +
        Math.cos(x * 0.03 + time * 1.3) * 10;

      ctx.shadowColor = '#ffb000';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffb000';
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // ========== LOGIC ==========
    const API_URL = "http://localhost:3000";

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch(`${API_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("userId", data.userId);
        localStorage.setItem("username", data.username);
        window.location.href = "index.html";
      } else {
        document.getElementById("authMessage").textContent = data.error;
      }
    }

    // Add sound to buttons
    document.getElementById("registerBtn").addEventListener("click", () => {
  playSound(buttonSound);

  setTimeout(() => {
    window.location.href = "register.html";
  }, 200);
});
    document.getElementById("loginBtn").addEventListener("click", () => {
      playSound(buttonSound);
      setTimeout(login, 100);
    });

    // Start everything
    document.addEventListener("DOMContentLoaded", () => {
      startBGM();
      initOscilloscope();
    });
  </script>
</body>
</html>
