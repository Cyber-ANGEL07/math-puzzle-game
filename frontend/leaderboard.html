<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRT NIGHTS · LEADERBOARD</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    /* Additional leaderboard‑specific styles */
    .leaderboard-page {
      background: #0f0f0f;
      border: 4px solid #cc8800;
      border-radius: 20px;
      padding: 30px;
      max-width: 800px;
      width: 90%;
      margin: 20px auto;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 0 2px #5a3e00, 0 0 0 5px #0a0a0a, 0 10px 30px rgba(0,0,0,0.8), inset 0 0 30px #3a2c00;
    }
    .leaderboard-page h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      text-align: center;
      font-family: 'Press Start 2P', cursive;
      text-shadow: 0 0 5px #ffb000;
    }
    .leaderboard-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      gap: 20px;
      flex-wrap: wrap;
    }
    .game-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
    }
    #gameSelect {
      background: #1a1a1a;
      border: 2px solid #cc8800;
      color: #ffb000;
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: inset 0 0 5px #000;
    }
    #gameSelect:hover {
      border-color: #ffb000;
      box-shadow: 0 0 8px #ffb000;
    }
    .back-btn {
      background: #ffb000;
      color: #0a0a0a;
      border: none;
      padding: 8px 16px;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #5a3e00;
      transition: 0.1s;
      text-transform: uppercase;
    }
    .back-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #5a3e00;
    }
    #leaderboardContainer {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 5px;
    }
    #leaderboardContainer::-webkit-scrollbar {
      width: 10px;
    }
    #leaderboardContainer::-webkit-scrollbar-track {
      background: #1a1a1a;
      border-left: 1px solid #cc8800;
    }
    #leaderboardContainer::-webkit-scrollbar-thumb {
      background: #cc8800;
      border-radius: 5px;
    }
    .leaderboard-card {
      background: #0a0a0a;
      border: 1px solid #cc8800;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
      font-size: 1.2rem;
      box-shadow: inset 0 0 5px #2a1e00, 0 0 5px #ffb00020;
    }
    .leaderboard-card:hover {
      border-color: #ffb000;
      transform: translateX(5px);
      box-shadow: inset 0 0 10px #3a2c00, 0 0 12px #ffb000;
    }
    .rank {
      font-weight: bold;
      width: 50px;
      text-align: left;
      font-size: 1.5rem;
      font-family: 'Press Start 2P', cursive;
    }
    .rank-1 {
      color: #ffcc66;
      text-shadow: 0 0 5px #ffcc66;
    }
    .rank-2 {
      color: #c0c0c0;
      text-shadow: 0 0 3px #c0c0c0;
    }
    .rank-3 {
      color: #cd7f32;
      text-shadow: 0 0 3px #cd7f32;
    }
    .username {
      flex: 1;
      text-align: left;
      margin-left: 20px;
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      letter-spacing: 1px;
    }
    .score {
      font-weight: bold;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem;
      min-width: 80px;
      text-align: right;
      color: #ffb000;
    }
    @media (max-width: 600px) {
      .leaderboard-page {
        padding: 20px;
      }
      .leaderboard-card {
        padding: 8px 12px;
      }
      .rank {
        width: 40px;
        font-size: 1rem;
      }
      .username {
        font-size: 1rem;
        margin-left: 10px;
      }
      .score {
        font-size: 0.9rem;
        min-width: 60px;
      }
    }
  </style>
</head>
<body>

  <!-- Audio elements -->
  <audio id="bgm" loop preload="auto"><source src="assets/audio/bgm.mp3" type="audio/mpeg"></audio>
  <audio id="clickSound" preload="auto"><source src="assets/audio/click_button.mp3" type="audio/mpeg"></audio>
  <audio id="buttonSound" preload="auto"><source src="assets/audio/click_button.mp3" type="audio/mpeg"></audio>

  <!-- Mute button -->
  <button id="muteBtn" onclick="toggleMute()">🔊</button>
  
  <!-- CRT background canvas -->
  <canvas id="bgCanvas"></canvas>
  <div class="circuit-overlay"></div>
  <div class="static-overlay" id="staticOverlay"></div>
  <div id="flashOverlay" class="flash-overlay"></div>

  <div class="leaderboard-page">
    <h1>🏆 LEADERBOARD 🏆</h1>
    <div class="leaderboard-controls">
      <div class="game-selector">
        <span>MODE:</span>
        <select id="gameSelect">
          <option value="trivia">TRIVIA</option>
          <option value="math">MATH</option>
        </select>
      </div>
      <button class="back-btn" onclick="navigateBack()">← BACK</button>
    </div>
    <div id="leaderboardContainer">
      <!-- Cards injected -->
    </div>
  </div>

  <script>
    // ========== AUDIO SETUP (same as math/trivia) ==========
    const bgm = document.getElementById("bgm");
    const clickSound = document.getElementById("clickSound");
    const buttonSound = document.getElementById("buttonSound");
    const muteBtn = document.getElementById("muteBtn");
    let isMuted = localStorage.getItem("bgmMuted") === "true";

    function setMuted(muted) {
      isMuted = muted;
      bgm.muted = muted;
      clickSound.muted = muted;
      buttonSound.muted = muted;
      muteBtn.textContent = muted ? "🔇" : "🔊";
      localStorage.setItem("bgmMuted", muted);
    }
    setMuted(isMuted);

    function toggleMute() {
      setMuted(!isMuted);
    }

    function playSound(sound) {
      if (!isMuted && sound) {
        sound.currentTime = 0;
        sound.play().catch(() => {});
      }
    }

    // Start background music
    let bgmStarted = false;
    function startBGM() {
      if (bgmStarted) return;
      bgm.volume = 0.2;
      bgm.play().then(() => bgmStarted = true).catch(() => {
        document.addEventListener('click', function retry() {
          startBGM();
          document.removeEventListener('click', retry);
        });
      });
    }

    // ========== OSCILLOSCOPE BACKGROUND ==========
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    let time = 0;
    let symbols = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    function initOscilloscope() {
      resizeCanvas();
      for (let i = 0; i < 15; i++) {
        symbols.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          char: ['+', '−', '×', '÷', '=', '√', '?', '!', '★', '🏆'][Math.floor(Math.random() * 10)],
          size: 20 + Math.random() * 20,
          speed: 0.1 + Math.random() * 0.5,
          opacity: 0.1 + Math.random() * 0.2
        });
      }
      animate();
    }

    function animate() {
      time += 0.05;
      ctx.fillStyle = 'rgba(10,10,10,0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawWaveform();
      drawScanningDot();
      drawFloatingSymbols();
      requestAnimationFrame(animate);
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,176,0,0.05)';
      for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawWaveform() {
      ctx.beginPath();
      ctx.strokeStyle = '#ffb000';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 10;
      const centerY = canvas.height / 2;
      for (let x = 0; x < canvas.width; x += 5) {
        const y = centerY + Math.sin(x * 0.02 + time) * 30 + Math.sin(x * 0.01 + time * 2) * 15 + Math.cos(x * 0.03 + time * 1.3) * 10;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function drawScanningDot() {
      const dotX = (time * 50) % canvas.width;
      const centerY = canvas.height / 2;
      const dotY = centerY + Math.sin(dotX * 0.02 + time) * 30 + Math.sin(dotX * 0.01 + time * 2) * 15 + Math.cos(dotX * 0.03 + time * 1.3) * 10;
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffb000';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawFloatingSymbols() {
      symbols.forEach(s => {
        s.y += s.speed;
        if (s.y > canvas.height) {
          s.y = -s.size;
          s.x = Math.random() * canvas.width;
        }
        ctx.font = `${s.size}px 'VT323'`;
        ctx.fillStyle = `rgba(255,176,0,${s.opacity})`;
        ctx.fillText(s.char, s.x, s.y);
      });
    }

    // ========== LEADERBOARD LOGIC ==========
    const gameSelect = document.getElementById("gameSelect");
    const container = document.getElementById("leaderboardContainer");

    async function loadLeaderboard(game) {
      try {
        const response = await fetch(`http://localhost:3000/api/leaderboard/${game}?limit=10`);
        const data = await response.json();
        container.innerHTML = "";

        if (!data.length) {
          container.innerHTML = "<p style='color:#ffb000; text-align:center'>⏳ No scores yet. Play a game!</p>";
          return;
        }

        data.forEach((entry, idx) => {
          const card = document.createElement("div");
          card.classList.add("leaderboard-card");

          let rankClass = "";
          if (idx === 0) rankClass = "rank-1";
          else if (idx === 1) rankClass = "rank-2";
          else if (idx === 2) rankClass = "rank-3";

          card.innerHTML = `
            <div class="rank ${rankClass}">${idx + 1}</div>
            <div class="username">${escapeHtml(entry.username)}</div>
            <div class="score">
  ${entry.score} <span style="font-size:0.8rem; color:#aaa;">(Total: ${entry.totalScore})</span>
</div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error("Failed to load leaderboard:", err);
        container.innerHTML = "<p style='color:#ff3300; text-align:center'>⚠️ FAILED TO LOAD. TRY AGAIN.</p>";
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Play sound on game change
    gameSelect.addEventListener("change", () => {
      playSound(clickSound);
      loadLeaderboard(gameSelect.value);
    });

    // Back button with sound
    function navigateBack() {
      playSound(buttonSound);
      window.location.href = "index.html";
    }

    // Start everything
    window.onload = () => {
      startBGM();
      initOscilloscope();
      loadLeaderboard(gameSelect.value);
    };
  </script>
</body>
</html>
